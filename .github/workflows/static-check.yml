name: Static site check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check expected files exist
        run: |
          test -f index.html
          test -f styles.css
          test -f src/app.js
          test -f src/audio-engine.js
          test -f src/merrinlab-patch-bus.js
          test -f merrinlab-module.json
